name: moffy
description: "Moffy - SNS利用時間を削減してかわいいMofiを育てる収集ゲーム"
publish_to: "none"
# version は <semver>+<buildNumber>。CIで buildNumber を付け替える運用。
version: 0.1.0+1

environment:
  # Dart 3 系 / Flutter 3.22 以降を前提（後日SDK導入時にこの範囲で固定）
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # --- 状態管理 (Riverpod / ARCHITECTURE §1-3) ---
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # --- ローカルDB (Drift = FlutterのSQLite ORM / 生データSSOT) ---
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24 # ネイティブSQLite同梱
  path_provider: ^2.1.3 # DBファイルの配置先
  path: ^1.9.0

  # --- バックエンド (Supabase / 確定値SSOT) ---
  supabase_flutter: ^2.5.6

  # --- ルーティング ---
  go_router: ^14.2.0

  # --- フォント (DESIGN_SYSTEM §3: Zen Maru / Noto Sans JP / Baloo 2) ---
  google_fonts: ^6.2.1

  # --- オンライン/オフライン検知 (S8) ---
  connectivity_plus: ^6.0.3

  # --- ローカル永続フラグ (オンボーディング初回表示判定 等) ---
  shared_preferences: ^2.2.3

  # --- 共有 (S13 グロースの種: 色違い孵化のSNSシェア / 画像生成) ---
  share_plus: ^10.1.0

  # --- 監視/分析（レール。第1パスでは初期化のみ・実送信は後続） ---
  # sentry_flutter: ^8.2.0
  # posthog_flutter: ^4.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # --- コード生成 (Riverpod / Drift) ---
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
  # google_fonts を使うため、フォントの assets バンドルは不要（実行時取得）。
  # ただし審査・オフライン安定のため、本番では fonts/ への同梱に切り替える想定（SETUP.md参照）。
  # assets:
  #   - assets/images/
