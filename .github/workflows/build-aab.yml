name: Build AAB

# 署名付きリリース AAB（Android App Bundle）をクラウドでビルドする。
# ローカル flutter は企業 WDAC でブロックされているため CI で実施。
# 署名鍵は GitHub Secret（ANDROID_KEYSTORE_BASE64 / _PASSWORD / KEY_ALIAS）から復元。
# 手動実行。成果物 app-release.aab を artifact としてダウンロードできる。
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.44.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Decode upload keystore (PKCS12)
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret が未設定です。"
            exit 1
          fi
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/upload-keystore.p12"
          echo "keystore decoded: $(wc -c < "$RUNNER_TEMP/upload-keystore.p12") bytes"

      # --dart-define で Supabase を注入（未注入だと Env.hasSupabase=false でモック動作に
      # なり、実データ（匿名認証+warmup卵+枠操作の永続）を検証できない / ios-build.yml と揃える）。
      - name: Build signed release AAB (Play 用)
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - name: Build signed release APK (appetize/プレビュー用)
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=FORCE_MOCK=true

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: moffy-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moffy-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
