name: ASC Set Review Detail (審査メモ / デモアカウント要否)

# 審査情報のうち**個人情報でない項目**（審査メモ・デモアカウントの要否）を設定する。
# 審査メモは tools/asc/review_notes.txt で版管理する（誰がいつ何を書いたか追える）。
#
# ⚠️ 連絡先（氏名・電話・メール）はここでは触らない。個人情報はオーナーが ASC の UI で
#    入力する。未入力ならこのワークフローは失敗する。
on:
  workflow_dispatch:
    inputs:
      version_string:
        description: "対象バージョン（例: 1.0）"
        required: true
        default: "1.0"
        type: string
      demo_account_required:
        description: "デモアカウントが必要か（Moffyは匿名認証でログイン画面が無いため false）"
        required: true
        default: false
        type: boolean

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode ASC API key (.p8)
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          if [ -z "$ASC_KEY_P8_BASE64" ]; then echo "::error::ASC_KEY_P8_BASE64 未設定"; exit 1; fi
          mkdir -p "$RUNNER_TEMP/asc"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/asc/key.p8"

      - name: Set review detail
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          node tools/asc/asc_set_review_detail.mjs \
            "$RUNNER_TEMP/asc/key.p8" "$ASC_KEY_ID" "$ASC_ISSUER_ID" \
            com.moffy.app "${{ inputs.version_string }}" \
            tools/asc/review_notes.txt \
            "${{ inputs.demo_account_required }}"

      - name: Clean up key
        if: always()
        run: rm -f "$RUNNER_TEMP/asc/key.p8"
