name: ASC Submit (審査に提出)

# ⚠️ 不可逆に近い操作。必ず asc-preflight.yml が緑になってから実行すること。
# 二重提出を防ぐため、既に提出済みの reviewSubmission があれば何もせず終了する。
on:
  workflow_dispatch:
    inputs:
      version_string:
        description: "対象バージョン（例: 1.0）"
        required: true
        default: "1.0"
        type: string
      i_ran_preflight:
        description: "asc-preflight を実行し、ブロッカー0件を確認した"
        required: true
        default: false
        type: boolean

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Guard
        run: |
          if [ "${{ inputs.i_ran_preflight }}" != "true" ]; then
            echo "::error::先に asc-preflight.yml を実行し、ブロッカー0件を確認すること。"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode ASC API key (.p8)
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          if [ -z "$ASC_KEY_P8_BASE64" ]; then echo "::error::ASC_KEY_P8_BASE64 未設定"; exit 1; fi
          mkdir -p "$RUNNER_TEMP/asc"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/asc/key.p8"

      - name: Submit for review
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          node tools/asc/asc_submit.mjs \
            "$RUNNER_TEMP/asc/key.p8" "$ASC_KEY_ID" "$ASC_ISSUER_ID" \
            com.moffy.app "${{ inputs.version_string }}"

      - name: Clean up key
        if: always()
        run: rm -f "$RUNNER_TEMP/asc/key.p8"
