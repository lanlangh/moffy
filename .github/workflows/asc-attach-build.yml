name: ASC Attach Build (バージョンに提出ビルドを紐付け)

# TestFlight へ上げたビルドを、ASC の「バージョン」に紐付ける。
# ビルドを上げただけでは審査に出せず、どのビルドを審査に出すかの明示が必要なため。
#
# ⚠️ 取り違え事故の防止: 「最新ビルド」ではなく**ビルド番号を明示**して紐付ける。
#    ビルド番号は ios-build.yml の run_number と一致する（--build-number=${{ github.run_number }}）。
#
# TestFlight の処理(processingState)が VALID になるまで最大40分待つ。
# 冪等: 既に同じビルドが紐付いていれば何もしない。実行後に読み直して検証する。
on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "紐付けるビルド番号（= ios-build.yml の run 番号）"
        required: true
        type: string
      version_string:
        description: "対象バージョン（例: 1.0）"
        required: true
        default: "1.0"
        type: string

jobs:
  attach:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode ASC API key (.p8)
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          if [ -z "$ASC_KEY_P8_BASE64" ]; then echo "::error::ASC_KEY_P8_BASE64 未設定"; exit 1; fi
          mkdir -p "$RUNNER_TEMP/asc"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/asc/key.p8"
          echo "decoded key bytes: $(wc -c < "$RUNNER_TEMP/asc/key.p8")"

      - name: Attach build to version
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          node tools/asc/asc_attach_build.mjs \
            "$RUNNER_TEMP/asc/key.p8" \
            "$ASC_KEY_ID" \
            "$ASC_ISSUER_ID" \
            com.moffy.app \
            "${{ inputs.version_string }}" \
            "${{ inputs.build_number }}"

      - name: Clean up key
        if: always()
        run: rm -f "$RUNNER_TEMP/asc/key.p8"
