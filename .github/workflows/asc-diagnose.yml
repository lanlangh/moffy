name: ASC Diagnose (提出できない原因の調査 + 残骸掃除)

on:
  workflow_dispatch:
    inputs:
      version_string:
        description: "対象バージョン"
        required: true
        default: "1.0"
        type: string
      cleanup:
        description: "空の reviewSubmission を取り消す"
        required: true
        default: true
        type: boolean

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode ASC API key (.p8)
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/asc/key.p8"
      - name: Diagnose
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          node tools/asc/asc_diagnose.mjs "$RUNNER_TEMP/asc/key.p8" "$ASC_KEY_ID" "$ASC_ISSUER_ID" \
            com.moffy.app "${{ inputs.version_string }}" "${{ inputs.cleanup }}"
      - name: Clean up key
        if: always()
        run: rm -f "$RUNNER_TEMP/asc/key.p8"
