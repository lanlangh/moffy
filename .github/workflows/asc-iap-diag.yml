name: ASC IAP Diag (2.1 課金要素の真因確定)
on:
  workflow_dispatch:
    inputs:
      version_string: { description: "対象バージョン", required: false, default: "1.0", type: string }
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode ASC API key (.p8)
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/asc/key.p8"
      - name: Diag
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: node tools/asc/asc_iap_diag.mjs "$RUNNER_TEMP/asc/key.p8" "$ASC_KEY_ID" "$ASC_ISSUER_ID" com.moffy.app "${{ inputs.version_string }}"
      - name: Clean up key
        if: always()
        run: rm -f "$RUNNER_TEMP/asc/key.p8"
