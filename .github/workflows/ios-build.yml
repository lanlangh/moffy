name: iOS Build (macOS)

# ⚠️ コスト注意: これは macOS ランナー(Linux の約10倍課金)。手動実行のみ。
# 目的: iOS ネイティブ(Screen Time)実装が実際にコンパイルできるかの最初の本検証。
# 既定 mode=compile は --no-codesign（署名アセット不要・最安の実コンパイル確認）。
#
# 署名/IPA/TestFlight は別ステップ(要 Apple Developer ポータル準備):
#   1) App ID 登録: com.moffy.app と com.moffy.app.MoffyMonitor の両方
#   2) App Group `group.com.moffy.app` を登録し両 App ID に付与
#   3) Family Controls(配布) を **拡張の App ID にも**申請・承認(アプリ側は承認済)
#   4) 両 App ID のプロビジョニングプロファイル発行
# これらが揃うまで mode=compile で Swift の健全性だけを担保する。
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "compile (--no-codesign / 最安) のみ対応(署名は未配線)"
        required: false
        default: "compile"
        type: choice
        options:
          - compile

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install xcodeproj
        run: gem install xcodeproj -v "~> 1.27"

      # ⚠️ 既知の依存衝突（Screen Time とは無関係・要・依存整合）:
      #  - device_info_plus 12.4.0(推移的) は新しい iOS SDK が必要
      #    (isiOSAppOnVision)。Xcode 16.x(iOS18 SDK)では "No visible @interface" で失敗。
      #  - sentry_flutter 8.9.0 → sentry-cocoa は Xcode 26.3 で
      #    "SentryBinaryImageCache has no member 'image'" で失敗。
      #  → 同一 Xcode で両立しない。**真の修正は sentry_flutter を Xcode26 対応版へ更新**
      #    (または device_info_plus を dependency_overrides で旧版に固定し Xcode 16)。
      #  暫定: device_info_plus が要求する新 SDK 側(latest-stable=Xcode26)に合わせておく。
      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Xcode / iOS SDK versions (diagnostic)
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Set up Flutter 3.44.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Wire DeviceActivityMonitor extension into the Xcode project
        run: ruby ios/tools/configure_screentime.rb

      - name: Flutter version
        run: flutter --version

      - name: Build iOS (compile check, no signing)
        run: flutter build ios --release --no-codesign

      - name: Summary
        if: always()
        run: |
          echo "iOS compile check finished. Signing/IPA/TestFlight は別途ポータル準備が必要(ワークフロー冒頭コメント参照)。"
