name: iOS Build (macOS)

# ⚠️ コスト注意: macOS ランナー(Linux の約10倍課金)。手動実行のみ。
# mode:
#   compile   = Swift コンパイル検証(--no-codesign / 最安・署名不要)
#   release   = 署名付き IPA を生成(自動プロビジョニング)→ artifact 出力（マイルストーン1）
#   testflight= 署名付き IPA を生成 → TestFlight へアップロード（要・ASCアプリレコード）
#
# 署名前提(docs/IOS_SCREENTIME.md §4 / 完了済):
#   App ID com.moffy.app + com.moffy.app.MoffyMonitor / App Group group.com.moffy.app /
#   Family Controls(Distribution)=両App IDで承認(Assigned) / Team ID=JKPUV48L3V。
#   ASC APIキー(Secret: ASC_KEY_ID/ASC_ISSUER_ID/ASC_KEY_P8_BASE64)=自動プロビジョニングに
#   **Admin ロール**必須(証明書/プロファイル作成のため)。TestFlight は ASC にアプリレコードが必要(手動作成)。
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "compile / release(署名IPA) / testflight(署名IPA+アップロード)"
        required: false
        default: "compile"
        type: choice
        options:
          - compile
          - release
          - testflight
      prod_ads:
        description: "本番の実広告を出す（=審査提出/公開ビルドのみ true。通常は false でテスト広告）"
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install xcodeproj
        run: gem install xcodeproj -v "~> 1.27"

      # Xcode 26（iOS 26 SDK）。Apple は iOS 26 SDK でのビルドをアップロード要件化（18.5 SDK は
      # validation 409 で拒否）。sentry_flutter 9.x(sentry-cocoa 8.56.2+) が Xcode 26 対応。
      # device_info_plus は自然解決版が iOS26 SDK で通る（旧 12.3.0 固定は撤去済）。CocoaPods 維持。
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Xcode / iOS SDK versions (diagnostic)
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Set up Flutter 3.44.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable

      # sentry_flutter 8.x は SPM 非対応 → CocoaPods に統一（docs/IOS_SCREENTIME.md §7）。
      - name: Use CocoaPods (disable Flutter SPM)
        run: flutter config --no-enable-swift-package-manager

      - name: Flutter pub get
        run: flutter pub get

      - name: Wire DeviceActivityMonitor extension into the Xcode project
        run: ruby ios/tools/configure_screentime.rb

      - name: Flutter version
        run: flutter --version

      # ---- compile モード: 署名なしコンパイル検証 ----
      - name: Build iOS (compile check, no signing)
        if: inputs.mode == 'compile'
        run: flutter build ios --release --no-codesign

      # ---- release / testflight モード: 署名付き IPA ----
      - name: Decode ASC API key (.p8)
        if: inputs.mode != 'compile'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          if [ -z "$ASC_KEY_P8_BASE64" ]; then echo "::error::ASC_KEY_P8_BASE64 未設定"; exit 1; fi
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "decoded key bytes: $(wc -c < ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8)"

      # Podfile 生成 + pod install + flutter assemble をまとめて実行（このプロジェクトは
      # SPM 雛形で Podfile 未コミットのため、flutter build が Podfile を生成して pod install する）。
      # --dart-define はここで Generated.xcconfig(DART_DEFINES) に書かれ、後続の
      # xcodebuild archive(Run Script→flutter assemble)に引き継がれてアプリに焼き込まれる。
      # Supabase 接続キーを注入しないと Env.hasSupabase=false でモック(空のホーム)になる。
      - name: Prepare iOS (generate Podfile, pods, assemble)
        if: inputs.mode != 'compile'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build ios --release --no-codesign \
            --build-number=${{ github.run_number }} \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=ADMOB_USE_PROD_ADS=${{ inputs.prod_ads }}

      - name: Write ExportOptions.plist
        if: inputs.mode != 'compile'
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>JKPUV48L3V</string>
            <key>destination</key><string>export</string>
            <key>uploadSymbols</key><true/>
            <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          PLIST

      # 自動プロビジョニング: 配布証明書 + Runner/MoffyMonitor 両方のプロファイルを生成。
      - name: Archive (signed, automatic provisioning)
        if: inputs.mode != 'compile'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            DEVELOPMENT_TEAM=JKPUV48L3V \
            CODE_SIGN_STYLE=Automatic \
            archive

      - name: Export signed IPA
        if: inputs.mode != 'compile'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          ls -la "$RUNNER_TEMP/export"

      - name: Upload signed IPA artifact
        if: inputs.mode != 'compile'
        uses: actions/upload-artifact@v4
        with:
          name: moffy-ios-ipa
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 7

      # ---- testflight モードのみ: アップロード（要・ASC アプリレコード） ----
      - name: Upload to TestFlight
        if: inputs.mode == 'testflight'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --validate-app -f "$RUNNER_TEMP/export/"*.ipa --type ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
          xcrun altool --upload-app -f "$RUNNER_TEMP/export/"*.ipa --type ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      - name: Summary
        if: always()
        run: echo "mode=${{ inputs.mode }} 完了。release/testflightはartifact 'moffy-ios-ipa' を参照。"
