name: ASC Preflight (提出前の不備チェック)

# 「審査に提出」を押す前に、ASC の実データを API で読んで不備・入力漏れを機械的に洗い出す。
# UI の目視は見落とすため、提出のたびにこれを回す。
# ❌(ブロッカー)が1件でもあれば失敗する。
on:
  workflow_dispatch:
    inputs:
      version_string:
        description: "対象バージョン（例: 1.0）"
        required: true
        default: "1.0"
        type: string

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode ASC API key (.p8)
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          if [ -z "$ASC_KEY_P8_BASE64" ]; then echo "::error::ASC_KEY_P8_BASE64 未設定"; exit 1; fi
          mkdir -p "$RUNNER_TEMP/asc"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/asc/key.p8"

      - name: Preflight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          node tools/asc/asc_preflight.mjs \
            "$RUNNER_TEMP/asc/key.p8" "$ASC_KEY_ID" "$ASC_ISSUER_ID" \
            com.moffy.app "${{ inputs.version_string }}"

      - name: Clean up key
        if: always()
        run: rm -f "$RUNNER_TEMP/asc/key.p8"
