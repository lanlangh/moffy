name: DB Verify

# Supabase の DB に経済マイグレーション(0001-0005,0007-0011)を適用し、抽選分布(distribution_check)を検証する。
# 手動実行のみ。接続情報は GitHub Secret `SUPABASE_DB_URL`（あなたが設定。値は CI 以外に出ない）。
# 推奨: まっさらな Supabase プロジェクトに対して実行（0001 は新規作成 DDL のため）。
on:
  workflow_dispatch:

jobs:
  migrate-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secret present
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret が未設定です。リポジトリ Settings → Secrets and variables → Actions で設定してください。"
            exit 1
          fi
          echo "psql version:"; psql --version

      - name: Apply migrations (0001 -> 0005, 0007 -> 0012)
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -e
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/0001_init.sql
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/0002_economy_rpcs.sql
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/0003_warmup_grants.sql
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/0004_security_hardening.sql
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/0005_economy_exploit_fix.sql
          # 0006(profilesトリガー)はauth.users依存のためクリーンDB検証では省略。
          # 0007/0008(獣ファミリー): distribution_check が20種/SR4種を検証する前提。
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/0007_beast_family_enum.sql
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/0008_beast_family_seed.sql
          # 0009(fn_ensure_first_egg = 最初の卵保証): permission_check が権限グリッドを検証する前提。
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/0009_ensure_first_egg.sql
          # 0010(保管枠上限のサーバー強制トリガー + app_config 上限値)。
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/0010_storage_cap.sql
          # 0011(確定の入口を fn_submit_and_finalize_day に一本化 = 対象日のサーバー権威化・
          #   行ロック・definer書込・timezone/usage_daily の直接書込剥奪)。
          #   permission_check の §3-A/§3-B は 0011 適用後の権限グリッドを期待する。
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/0011_server_authoritative_finalize_date.sql
          # 0012(基準値の母集団を確定済み日だけに絞る = fail-closed)。**0011 の後**に適用する
          #   （0012 は fn_finalize_day を create or replace するが、0005 末尾にあった
          #    authenticated への grant は引き継がず revoke したままにする）。
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/0012_baseline_finalized_only.sql

      - name: Run distribution check (§4 抽選分布 / drop_tables 合計=1.0)
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/distribution_check.sql

      - name: Run permission check (§3 RPC権限グリッド / 列GRANT / H4-1実証)
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/permission_check.sql
